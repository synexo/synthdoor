# ============================================================
# synthdoor.conf — SynthDoor BBS Door Game Engine Configuration
# ============================================================
# Format: key = value
# Sections: [section_name] (optional, for organization)
# Comments begin with #

# ─── Logging ──────────────────────────────────────────────
# Directory where daily rotating log files are written.
logs_dir       = ./logs
# Number of days of log files to retain before pruning.
log_keep_days  = 7
# Time of day (HH:MM, server local time) to run log pruning.
log_prune_time = 02:00

# ─── Database ─────────────────────────────────────────────
db_path = ./data/synthdoor.db

# ─── Authentication ────────────────────────────────────────
# auth_mode = naive        — Trust the username provided via telnet or rlogin.
#                            No SynthAuth required. PEPPER / SYNTH_SALT not used.
#                            Naive-mode usernames are validated to be 1-13
#                            alphanumeric ASCII characters; any input outside
#                            that alphabet (path separators, spaces, control
#                            bytes, …) is rejected.
# auth_mode = authenticated — Use SynthAuth for all connections.
#                             Requires PEPPER and SYNTH_SALT environment variables.
#                             Set them in .env (copy from .env.example in packages/synth-auth/).
auth_mode = authenticated

# Pre-login art file displayed before the username/auth prompt on all transports
# (telnet, rlogin interactive, web).  Supports raw CP437/.ANS files, plain ASCII,
# and UTF-8/Unicode text (auto-converted to CP437).  SAUCE metadata is stripped
# automatically.  Remove the # to activate.
# Path is relative to the synthdoor root, or absolute.
#login_art_file = ./config/art/login.ans

# ── Authenticated mode throttle settings ─────────────────────────────────────
# These only apply when auth_mode = authenticated.
# Defaults shown below match the built-in values; uncomment to override.
#
# Maximum failed code-word attempts per session before the connection is dropped.
auth_max_login_attempts = 5
#
# Sliding time window (seconds) over which login attempts are counted per IP.
auth_login_window_secs = 60
#
# Maximum new account registrations per IP within the registration window.
auth_max_registrations = 5
#
# Sliding time window (seconds) for the registration rate limit.
auth_register_window_secs = 60

# Sysop usernames (naive mode only).
# Comma-separated list of usernames permitted to connect as sysop.
# Any username matching the sysop* prefix that is NOT on this list will be
# refused. In authenticated mode, sysop* accounts are created via
# --make-sysop <username> or the sysop panel; this list is not used.
sysop_users = sysop

# Path to the SynthAuth SQLite database (authenticated mode only).
# Kept separate from the main game DB for clean separation.
# auth_db_path = ./data/synth-auth.db

# Path to menu configurations
# menus_dir = ./config/menus

# ─── Game selection ───────────────────────────────────────
# Set default_game to a game name to skip the menu on telnet.
# Leave blank to show the game selection menu.
#default_game = meteoroid

# Directory containing game folders
# (default: ./games relative to project root)
#games_dir = ./games

# Role-restricted games.
# Comma-separated list of game:role pairs.
# Games listed here are hidden from menu auto-generation and the top menu,
# and can only be launched by users with the matching role.
# Example: game_roles = sysop-panel:sysop, admin-tool:sysop
game_roles = sysop-panel:sysop

# ─── Network bind addresses ─────────────────────────────────────────────────
#
# Which interface(s) the listening sockets attach to. Useful on multi-homed
# hosts where the BBS should only be reachable on a specific NIC, or when
# the WebSocket port is meant to be loopback-only behind a reverse proxy.
#
#   bind_address = 0.0.0.0          # default — all IPv4 interfaces
#   bind_address = ::               # all IPv6 (and v4 via mapped, on dual stack)
#   bind_address = 127.0.0.1        # loopback only
#   bind_address = 192.0.2.5        # a specific NIC on a multi-homed host
#
# bind_address sets the default for every transport. Each transport can
# override the default independently:
#
#   telnet_bind_address = ...
#   rlogin_bind_address = ...
#   web_bind_address    = ...
#
# Typical reverse-proxy setup: web_bind_address = 127.0.0.1 with the proxy
# on the same host doing TLS termination and forwarding. Pair this with
# trust_proxy = loopback (see below) so client IPs come through correctly.
#
#bind_address = 0.0.0.0

# ─── Reverse-proxy / X-Forwarded-For (web transport) ─────────────────────────
#
# When the web transport is exposed through a reverse proxy (nginx, Caddy,
# Cloudflare, HAProxy, etc.) Node sees the proxy's IP on every connection.
# Without this setting, the rate limiters and audit logs would all bucket
# every connection together as if they came from the proxy. Conversely,
# trusting X-Forwarded-For unconditionally would let any internet client
# spoof their IP — this is a common, severe misconfiguration.
#
# trust_proxy controls when X-Forwarded-For is honored:
#
#   trust_proxy = false        # default — never trust XFF (direct exposure
#                                or no upstream proxy)
#   trust_proxy = loopback     # trust XFF only when the upstream is on the
#                                same host (127.0.0.0/8 or ::1)
#   trust_proxy = 10.0.0.0/8, 192.168.0.0/16, 192.0.2.7
#                              # explicit IP/CIDR allowlist of trusted proxies
#
# The check applies to the immediate TCP peer: if it isn't trusted, the
# X-Forwarded-For header is ignored entirely, regardless of its contents.
# When trusted, we walk the XFF chain right-to-left and use the first IP
# that isn't itself in the trust list — that is the real edge client.
#
# Leave commented out (or set to false) when the BBS is reachable directly
# from the internet without a proxy in front of it.
#
#trust_proxy = loopback

# ─── Telnet Transport ─────────────────────────────────────
telnet_enabled = true
telnet_port    = 2323

# ─── rlogin Transport ─────────────────────────────────────
# See CLAUDE.md for full rlogin field semantics in both auth modes.
rlogin_enabled = true
rlogin_port    = 1513

# ─── Web Transport ────────────────────────────────────────
# WebSocket + HTTP server serving the fTelnet web client.
# Web connections proxy through to the telnet transport.
web_enabled = true
web_port    = 8080
web_max_idle_minutes = 10080

# ─── Game: Tetris ─────────────────────────────────────────
[game:tetris]
high_score_limit  = 100
starting_level    = 1
speed_multiplier  = 1.0

# ─── Game: Daily Horoscope ────────────────────────────────
[game:daily-horoscope]
api_timeout_ms    = 6000
show_all_on_start = false

