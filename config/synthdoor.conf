# ============================================================
# synthdoor.conf — SynthDoor BBS Door Game Engine Configuration
# ============================================================
# Format: key = value
# Sections: [section_name] (optional, for organization)
# Comments begin with #

# ─── Database ─────────────────────────────────────────────
db_path = ./data/synthdoor.db

# ─── Authentication ────────────────────────────────────────
# auth_mode = naive        — Trust the username provided via telnet or rlogin.
#                            No SynthAuth required. PEPPER / SYNTH_SALT not used.
# auth_mode = authenticated — Use SynthAuth for all connections.
#                             Requires PEPPER and SYNTH_SALT environment variables.
#                             Set them in .env (copy from .env.example in packages/synth-auth/).
auth_mode = naive

# Path to the SynthAuth SQLite database (authenticated mode only).
# Kept separate from the main game DB for clean separation.
# auth_db_path = ./data/synth-auth.db

# Path to menu configurations
# menus_dir = ./config/menus

# ─── Game selection ───────────────────────────────────────
# Set default_game to a game name to skip the menu on telnet.
# Leave blank to show the game selection menu.
#default_game = meteoroid

# Directory containing game folders
# (default: ./games relative to project root)
#games_dir = ./games

# ─── Telnet Transport ─────────────────────────────────────
telnet_enabled = true
telnet_port    = 2323

# ─── rlogin Transport ─────────────────────────────────────
# See CLAUDE.md for full rlogin field semantics in both auth modes.
rlogin_enabled = true
rlogin_port    = 1513

# ─── Web Transport ────────────────────────────────────────
# WebSocket + HTTP server serving the fTelnet web client.
# Web connections proxy through to the telnet transport.
web_enabled = true
web_port    = 8080
web_max_idle_minutes = 10080

# ─── Game: Tetris ─────────────────────────────────────────
[game:tetris]
high_score_limit  = 100
starting_level    = 1
speed_multiplier  = 1.0

# ─── Game: Daily Horoscope ────────────────────────────────
[game:daily-horoscope]
api_timeout_ms    = 6000
show_all_on_start = false

[game:mrc-chat]
host     = na-multi.relaychat.net
port     = 5001
ssl      = true
